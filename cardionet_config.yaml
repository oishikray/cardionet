# CardioNet master configuration
#
# Purpose
# -------
# Central user-editable configuration for local development, smoke tests,
# ACDC/CineMA inference, QC outputs, downstream feature extraction, and
# future expansion into training / evaluation / lab datasets.
#
# Notes
# -----
# - This file is intentionally broad and somewhat redundant.
# - Not every section is required by every script.
# - Prefer reading only the sections a given script actually uses.
# - Paths are written in a Windows-friendly style because that is the
#   current primary development environment.
# - Keep script logic thin: scripts should read this file, validate the
#   fields they need, and then call library code.

project:
  name: "CardioNet"
  version: "0.1.0"
  description: "Cardiac MRI segmentation and feature extraction pipeline built around CineMA and downstream CardioNet analysis."
  environment: "local-dev"
  random_seed: 42
  notes: "User-editable master config. Safe place for convenient effective hardcodes."

paths:
  project_root: "D:/CardioNet"
  src_root: "D:/CardioNet/src"
  scripts_root: "D:/CardioNet/scripts"
  tests_root: "D:/CardioNet/tests"
  data_root: "D:/CardioNet/data"
  outputs_root: "D:/CardioNet/outputs"
  logs_root: "D:/CardioNet/logs"
  temp_root: "D:/CardioNet/tmp"

  # Legacy / external repositories
  cinema_repo_root: "D:/CardioNet/CineMA"

  # Optional local HuggingFace mirror or exported model directory
  model_root: "D:/CardioNet/model/hf_mirror/mathpluscode_CineMA"

  # Primary datasets
  datasets:
    acdc_raw_root: "D:/CardioNet/data/acdc/raw"
    acdc_processed_root: "D:/CardioNet/data/acdc/processed"
    acdc_train_root: "D:/CardioNet/data/acdc/processed/train"
    acdc_val_root: "D:/CardioNet/data/acdc/processed/val"
    acdc_test_root: "D:/CardioNet/data/acdc/processed/test"

    # Placeholder for future internal / lab datasets
    bsc_raw_root: "D:/CardioNet/data/bsc/raw"
    bsc_processed_root: "D:/CardioNet/data/bsc/processed"

  # Default output locations by stage
  stage_outputs:
    segmentation: "D:/CardioNet/outputs/segmentation"
    qc: "D:/CardioNet/outputs/qc"
    geometry: "D:/CardioNet/outputs/geometry"
    features: "D:/CardioNet/outputs/features"
    reports: "D:/CardioNet/outputs/reports"
    debug: "D:/CardioNet/outputs/debug"

conventions:
  # Canonical internal axis order for CardioNet numpy arrays.
  # Scripts should convert external inputs into this order as early as possible.
  image_axes: ["x", "y", "z", "t"]

  # Current label convention assumed by ACDC/CineMA segmentation outputs.
  labels:
    background: 0
    rv: 1
    myocardium: 2
    lv: 3

  views:
    sax: "short-axis"

  file_naming:
    acdc_patient_prefix: "patient"
    acdc_patient_digits: 3
    acdc_cine_suffix: "_sax_t.nii.gz"
    predicted_labels_suffix: "_pred_labels.npy"
    saved_images_suffix: "_images.npy"
    volume_plot_suffix: "_mask_volume.png"

runtime:
  device:
    preferred: "auto"        # one of: auto, cpu, cuda
    explicit_index: 0         # relevant if multi-GPU CUDA setup exists later
    allow_mps: false
    fallback_to_cpu: true

  precision:
    autocast_enabled: true
    prefer_bfloat16_if_available: true
    default_cpu_dtype: "float32"
    default_cuda_dtype: "float32"

  reproducibility:
    deterministic_torch: false
    cudnn_benchmark: false

logging:
  level: "INFO"
  console: true
  save_to_file: false
  log_filename: "cardionet.log"
  tqdm_enabled: true

segmentation:
  backend: "cinema_convunetr"

  model:
    source: "local"           # local, huggingface, upstream-cinema
    architecture: "ConvUNetR"
    trained_dataset: "acdc"
    view: "sax"
    seed: 0
    strict_load: true
    eval_mode: true

    # Optional direct override. If these are non-empty, scripts may use them
    # instead of constructing paths from model_root/trained_dataset/view/seed.
    explicit_weights_path: ""
    explicit_config_path: ""

    # Relative model layout under paths.model_root if explicit paths are blank.
    local_layout:
      finetuned_dir_template: "finetuned/segmentation/{trained_dataset}_{view}"
      weights_template: "{trained_dataset}_{view}_{seed}.safetensors"
      config_filename: "config.yaml"

  inference:
    enabled: true
    batch_mode: "framewise"   # framewise for current CineMA workflow
    input_key: "sax"
    output_key: "sax"
    temporal_subsampling_step: 1
    save_input_arrays: true
    save_prediction_arrays: true
    overwrite_existing_outputs: true

    preprocessing:
      scale_intensity: true
      pad_spatial: true
      pad_spatial_size: [192, 192, 16]
      pad_method: "end"

    expected:
      input_ndim: 4
      canonical_axes: ["x", "y", "z", "t"]
      logit_channels: 4
      min_num_slices: 1
      min_num_frames: 1

    output:
      dtype: "uint8"
      save_format: "npy"

    validation:
      enforce_4d_input: true
      enforce_output_shape_match: true
      raise_on_missing_input: true
      validate_unique_labels: false
      allowed_labels: [0, 1, 2, 3]

  io:
    nifti_loader: "SimpleITK"
    transpose_after_load: true
    transpose_mode: "reverse_axes"   # current old-script behavior via np.transpose(arr)
    require_4d_after_load: true

  labels:
    background: 0
    rv: 1
    myocardium: 2
    lv: 3

qc:
  enabled: true

  segmentation_overlays:
    enabled: true
    save_per_slice_gifs: true
    figure_size: [4, 4]
    dpi: 150
    gif_loop: 0
    gif_duration_base_ms: 50
    cmap: "gray"
    overlay_alpha: 0.6

    colors_rgba:
      rv: [0.423529, 0.556863, 0.749020, 0.6]
      myocardium: [0.839216, 0.713725, 0.337255, 0.6]
      lv: [0.509804, 0.701961, 0.400000, 0.6]

  volume_plot:
    enabled: true
    figsize: [5, 4]
    dpi_screen: 120
    dpi_save: 300
    voxel_volume_ml: 0.01
    ylabel: "Volume (ml, relative)"
    compute_lvef: true
    compute_rvef: true

  save_intermediate_metadata:
    enabled: false
    save_json_sidecars: false

geometry:
  enabled: true

  general:
    label_lv: 3
    label_myo: 2
    label_rv: 1
    expected_axes: ["x", "y", "z", "t"]

  slice_selection:
    method: "manual_or_rule_based"
    default_mid_slice_strategy: "center_nonempty"
    default_frame_strategy: "max_lv_area"

  aha:
    enabled: true
    use_rv_myo_contact_anchor: true
    segment_counts:
      basal: 6
      mid: 6
      apical: 4
      apex: 1
    angle_units: "degrees"
    full_circle_samples: 360

features:
  enabled: true

  wall_thickness:
    enabled: true
    angular_samples: 360
    interpolate_missing: false
    enforce_full_coverage: false
    save_raw_profiles: true

  normalized_wall_thickness:
    enabled: true
    normalization_reference: "ed_frame"
    save_matrix: true

  cavity_metrics:
    enabled: false

  strain:
    enabled: false
    notes: "Reserved for future work; currently outside main scope."

datasets:
  active_dataset: "acdc"

  acdc:
    enabled: true
    dataset_id: "acdc"
    processed_root: "D:/CardioNet/data/acdc/processed"
    split: "train"
    view: "sax"

    patients:
      mode: "range"             # range, explicit_list, all
      start: 1
      end: 100
      explicit_ids: []
      zero_pad: 3
      prefix: "patient"

    file_patterns:
      cine: "{patient_id}_sax_t.nii.gz"
      ed: "{patient_id}_frame01.nii.gz"
      es: "{patient_id}_frameXX.nii.gz"
      gt: "{patient_id}_gt.nii.gz"

    assumptions:
      short_axis_only: true
      segmentation_labels: [0, 1, 2, 3]
      canonical_output_axes: ["x", "y", "z", "t"]
      current_loader_requires_transpose: true

  bsc_internal:
    enabled: false
    dataset_id: "bsc_internal"
    processed_root: "D:/CardioNet/data/bsc/processed"
    split: "train"
    view: "sax"

outputs:
  save_predictions: true
  save_inputs: true
  save_qc: true
  save_geometry_outputs: true
  save_feature_outputs: true
  create_patient_subdirs: true

  naming:
    patient_output_dir_template: "{patient_id}_inference"
    basename_template: "{patient_id}_{view}_t"

scripts:
  infer_acdc_cine:
    enabled: true
    dataset_name: "acdc"
    split: "train"
    use_dataset_section_patient_selector: true
    override_patient_start: null
    override_patient_end: null
    override_patient_ids: []
    output_root: "D:/CardioNet/outputs/segmentation"
    save_gif: true
    save_volume_plot: true

  scratch_smoke_acdc_inference:
    enabled: true
    dataset_name: "acdc"
    split: "train"
    patient_ids: ["patient001", "patient021"]
    output_root: "D:/CardioNet/scratch/acdc_smoke"
    output_dir_template: "{patient_id}"
    save_gif: true
    save_volume_plot: true
    save_aha_outputs: true

  example_acdc_pipeline:
    enabled: true
    dataset_name: "acdc"
    split: "train"
    patient_ids: ["patient001", "patient021"]
    output_root: "D:/CardioNet/scratch/acdc_example"
    output_dir_template: "{patient_id}"
    save_gif: true
    save_volume_plot: true
    save_aha_outputs: true

  extract_aha_wt_nwt:
    enabled: true
    patient_id: "patient001"
    source_script: "infer_acdc_cine"
    output_root: "D:/CardioNet/outputs/features"
    output_dir_template: "{patient_id}_aha"
    slice_index: null
    frame_index_for_overlay: null
    ring_type: "mid"
    n_rays: 360
    ray_step: 0.25
    max_radius: 250.0
    smooth_window: 11
    line_radius: 90.0

  smoke_test_segmentation:
    enabled: false
    patient_id: "patient001"
    output_root: "D:/CardioNet/outputs/debug"

  aha_geometry_debug:
    enabled: false
    patient_id: "patient001"
    slice_index: null
    frame_index: null
    output_root: "D:/CardioNet/outputs/geometry"

validation:
  fail_fast: true
  warnings_as_errors: false

  required_paths:
    - "paths.project_root"
    - "paths.model_root"

  recommended_paths:
    - "paths.datasets.acdc_processed_root"
    - "paths.stage_outputs.segmentation"
    - "paths.stage_outputs.qc"

  assumptions_to_check:
    - "input cine is 4D after loading"
    - "loaded cine matches canonical axis order x,y,z,t"
    - "segmentation labels follow 0/1/2/3 convention"
    - "pad size is compatible with model expectations"
    - "output z-dimension is cropped back to original depth"

dev:
  debug_mode: false
  save_extra_arrays: false
  print_shapes: true
  print_unique_labels: true
  keep_legacy_compatibility_switches: true

legacy_compatibility:
  cinema:
    allow_old_transpose_loader: true
    allow_old_label_semantics: true
    allow_framewise_inference_only: true

  old_script_reference:
    infer_acdc_cine_and_save_labels: true
    notes: "Preserve behavior first, clean up later."

future:
  planned_extensions:
    - "argparse or Hydra overlays on top of this YAML"
    - "dataset-specific schema validation"
    - "multi-view support"
    - "training configuration"
    - "evaluation metrics configuration"
    - "internal lab dataset integration"
    - "cluster execution profiles"
