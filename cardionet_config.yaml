# Compatibility entrypoint for the split CardioNet runtime config.
#
# New edits should usually go into the purpose-specific files under config/.
# This file exists so older commands that pass --config cardionet_config.yaml
# still load the same merged configuration.

config_files:
  - config/paths.yaml
  - config/segmentation.yaml
  - config/features.yaml
  - config/classification.yaml
  - config/visualisation.yaml
  - config/smoke_test.yaml
  - config/full_dataset.yaml
  - config/cluster.yaml
